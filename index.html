<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>🔥 Firebox Maze</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
</head>
<body>
<div id="game"></div>

<!-- in-game HUD -->
<div id="hud" class="hidden">
  <div id="hud-left">
    <div id="hearts"></div>
    <div id="badges">
      <span class="badge" id="level-badge">⭐ Level 1</span>
      <span class="badge" id="key-badge">🗝️</span>
      <span class="badge" id="rescued-badge">🧑 0</span>
    </div>
  </div>
  <div id="banner"><span id="banner-text"></span></div>
  <div id="hud-right">
    <canvas id="minimap" width="360" height="360"></canvas>
    <div id="hud-buttons">
      <button class="hbtn" id="btn-garage" title="Garage">🎒</button>
      <button class="hbtn" id="btn-save" title="Save">💾</button>
      <button class="hbtn" id="btn-mute" title="Sound">🔊</button>
    </div>
  </div>
  <div id="joy-base" class="hidden"><div id="joy-knob"></div></div>
  <button id="btn-fire" class="hidden">💥</button>
  <div id="toast" class="hidden"></div>
</div>

<!-- title screen -->
<div id="title-screen" class="screen">
  <h1 id="game-title">🔥 FIREBOX MAZE 🔥</h1>
  <p class="subtitle">🚗 Drill the maze! 🗝️ Free the people! 🌀 Beat all 10 levels!</p>
  <button class="big-btn" id="btn-play">▶️ PLAY</button>
  <div id="level-grid"></div>
  <div class="title-foot">
    <button class="small-btn" id="btn-title-mute">🔊 Sound</button>
    <button class="small-btn" id="btn-reset">🧹 Start Over</button>
  </div>
</div>

<!-- garage overlay -->
<div id="garage" class="screen hidden">
  <h2>🎒 Your Garage</h2>
  <div class="garage-section"><h3>⚔️ Weapon</h3><div class="cards" id="weapon-cards"></div></div>
  <div class="garage-section"><h3>🛡️ Armor</h3><div class="cards" id="armor-cards"></div></div>
  <div class="garage-section"><h3>🎨 Color</h3><div class="cards" id="color-swatches"></div></div>
  <button class="big-btn" id="btn-garage-close">✅ GO!</button>
</div>

<!-- level complete -->
<div id="level-done" class="screen hidden">
  <h1 id="done-title">🎉 LEVEL DONE! 🎉</h1>
  <p id="done-text" class="subtitle"></p>
  <button class="big-btn" id="btn-next">▶️ NEXT LEVEL</button>
  <button class="small-btn" id="btn-done-menu">🏠 Menu</button>
</div>

<!-- win screen -->
<div id="win-screen" class="screen hidden">
  <h1>🏆 YOU WIN!! 🏆</h1>
  <p id="win-text" class="subtitle"></p>
  <p class="subtitle">You are a MAZE HERO! 🦸</p>
  <button class="big-btn" id="btn-win-again">▶️ PLAY AGAIN</button>
  <button class="small-btn" id="btn-win-menu">🏠 Menu</button>
</div>

<!-- pause -->
<div id="pause-screen" class="screen hidden">
  <h1>⏸️ Paused</h1>
  <button class="big-btn" id="btn-resume">▶️ KEEP PLAYING</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
